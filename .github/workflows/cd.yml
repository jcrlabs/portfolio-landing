name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, develop]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/jcrlabs
  IMAGE: portfolio-landing

jobs:
  deploy-test:
    name: Deploy → test
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (develop-SHA)
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t $REGISTRY/$IMAGE:develop-$SHA .
          docker push $REGISTRY/$IMAGE:develop-$SHA
          echo "SHA=$SHA" >> $GITHUB_ENV

      - name: Update values-test.yaml
        run: |
          sed -i "s/tag: develop-.*/tag: develop-$SHA/" deploy/helm/values-test.yaml
          git config user.email "ci@jcrlabs.net"
          git config user.name "CI Bot"
          git add deploy/helm/values-test.yaml
          git diff --staged --quiet || git commit -m "chore: update test image to develop-$SHA"
          git push

      - name: ArgoCD sync (test namespace)
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          GHCR_PULL_SECRET_ENCRYPTED: ${{ secrets.GHCR_PULL_SECRET_ENCRYPTED }}
        run: |
          curl -sL https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 \
            -o /usr/local/bin/argocd && chmod +x /usr/local/bin/argocd
          PULL_SECRET=$(printf '%s' "$GHCR_PULL_SECRET_ENCRYPTED" | tr -d '[:space:]')
          argocd app set portfolio-landing-test \
            --helm-set "image.pullSecretEncrypted=$PULL_SECRET" \
            --server $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --grpc-web
          argocd app sync portfolio-landing-test \
            --server $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --grpc-web

  deploy-prod:
    name: Deploy → prod
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (SHA)
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t $REGISTRY/$IMAGE:$SHA .
          docker push $REGISTRY/$IMAGE:$SHA
          echo "SHA=$SHA" >> $GITHUB_ENV

      - name: Update values-prod.yaml
        run: |
          sed -i "s/tag: .*/tag: $SHA/" deploy/helm/values-prod.yaml
          git config user.email "ci@jcrlabs.net"
          git config user.name "CI Bot"
          git add deploy/helm/values-prod.yaml
          git diff --staged --quiet || git commit -m "chore: deploy $SHA to prod"
          git push

      - name: ArgoCD sync (prod namespace)
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          GHCR_PULL_SECRET_ENCRYPTED: ${{ secrets.GHCR_PULL_SECRET_ENCRYPTED }}
        run: |
          curl -sL https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 \
            -o /usr/local/bin/argocd && chmod +x /usr/local/bin/argocd
          PULL_SECRET=$(printf '%s' "$GHCR_PULL_SECRET_ENCRYPTED" | tr -d '[:space:]')
          argocd app set portfolio-landing \
            --helm-set "image.pullSecretEncrypted=$PULL_SECRET" \
            --server $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --grpc-web
          argocd app sync portfolio-landing \
            --server $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --grpc-web

      - name: Verify rollout + auto-rollback
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kc
          KUBECONFIG=/tmp/kc kubectl rollout status deployment/portfolio-landing \
            -n portfolio --timeout=5m || \
          {
            echo "=== Rollout failed — pod diagnostics ==="
            KUBECONFIG=/tmp/kc kubectl get pods -n portfolio -l app.kubernetes.io/name=portfolio-landing
            KUBECONFIG=/tmp/kc kubectl describe pods -n portfolio -l app.kubernetes.io/name=portfolio-landing | tail -40
            KUBECONFIG=/tmp/kc kubectl get events -n portfolio --sort-by='.lastTimestamp' | tail -20
            KUBECONFIG=/tmp/kc kubectl rollout undo deployment/portfolio-landing -n portfolio
            exit 1
          }
