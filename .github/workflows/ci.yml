name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [develop, main]

jobs:
  ci:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        # --legacy-peer-deps: framer-motion may declare peerDep react@^18
        # while we use react@19 — both are runtime-compatible
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Needed at build time for ISR fetches in server components
          GATEWAY_URL: https://portfolio-api.jcrlabs.net
