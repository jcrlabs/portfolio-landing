name: CI

on:
  push:
    branches: ['**']

jobs:
  ci:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          GATEWAY_URL: https://portfolio-api.jcrlabs.net
          NEXT_TELEMETRY_DISABLED: 1
