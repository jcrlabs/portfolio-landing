name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop, main]

env:
  REGISTRY: ghcr.io/jonathancaamano
  IMAGE: portfolio-landing

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci --frozen-lockfile

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy-test:
    needs: ci
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (develop-SHA)
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t $REGISTRY/$IMAGE:develop-$SHA .
          docker push $REGISTRY/$IMAGE:develop-$SHA
          echo "SHA=$SHA" >> $GITHUB_ENV

      - name: Update values-test.yaml
        run: |
          sed -i "s/tag: develop-.*/tag: develop-$SHA/" deploy/helm/values-test.yaml
          git config user.email "ci@jcrlabs.net"
          git config user.name "CI Bot"
          git add deploy/helm/values-test.yaml
          git diff --staged --quiet || git commit -m "chore: update test image to develop-$SHA"
          git push

      - name: ArgoCD sync (test)
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          curl -sL https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 \
            -o /usr/local/bin/argocd && chmod +x /usr/local/bin/argocd
          argocd app sync portfolio-landing-test \
            --server $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --grpc-web

  deploy-prod:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (semver)
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          docker build -t $REGISTRY/$IMAGE:$VERSION .
          docker push $REGISTRY/$IMAGE:$VERSION
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update values-prod.yaml
        run: |
          sed -i "s/tag: .*/tag: $VERSION/" deploy/helm/values-prod.yaml
          git config user.email "ci@jcrlabs.net"
          git config user.name "CI Bot"
          git add deploy/helm/values-prod.yaml
          git diff --staged --quiet || git commit -m "chore: release $VERSION"
          git push

      - name: ArgoCD sync (prod)
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          curl -sL https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 \
            -o /usr/local/bin/argocd && chmod +x /usr/local/bin/argocd
          argocd app sync portfolio-landing \
            --server $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --grpc-web

      - name: Verify rollout + auto-rollback
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kc
          KUBECONFIG=/tmp/kc kubectl rollout status deployment/portfolio-landing \
            -n portfolio --timeout=5m || \
          (KUBECONFIG=/tmp/kc kubectl rollout undo deployment/portfolio-landing \
            -n portfolio && exit 1)
