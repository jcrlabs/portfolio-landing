replicaCount: 1

image:
  repository: ghcr.io/jcrlabs/portfolio-landing
  pullPolicy: IfNotPresent
  tag: ""
  pullSecretName: ghcr-pull-secret

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
  host: ""
  tls: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

hpa:
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

env:
  GATEWAY_URL: ""
