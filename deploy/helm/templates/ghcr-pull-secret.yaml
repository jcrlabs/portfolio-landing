{{- if .Values.image.pullSecretEncrypted }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-pull-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  template:
    metadata:
      name: ghcr-pull-secret
      namespace: {{ .Release.Namespace }}
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
    type: kubernetes.io/dockerconfigjson
  encryptedData:
    .dockerconfigjson: {{ .Values.image.pullSecretEncrypted }}
{{- end }}
